name: Refresh package rankings

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Generation walks every seed stack via `npm install --package-lock-only`
    # (33 stacks at concurrency=4 takes ~3-5 min on hosted runners), then
    # downloads + parses the npm-rank popularity HTML. Add headroom for
    # cold npm-registry caches.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - run: npm run generate
      - name: Commit refreshed rankings
        run: |
          if git diff --quiet -- data; then
            echo "No package ranking changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/packages.json data/packages.txt data/packages.sha256 data/transitives.json
          git commit -m "chore: refresh package rankings"
          git push

